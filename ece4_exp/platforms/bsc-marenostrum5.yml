# MN5 Cores: https://gitlab.earth.bsc.es/es/auto-ecearth4/-/wikis/mn5_cores
- base.context:
    ppn: 112  # cores per node — used to convert nodes → processors
    slurm-wrapper-taskset:
      oifs:
        omp_num_threads: 4
        omp_stacksize: "64M"

      AMIP-SR:
        slurm:
          sbatch:
            opts:
              time: "00:30:00"  # Default for testing
        groups:
          - { nodes: 1,      amipfr: 1, oifs: 27, xios: 1 }
          - { nodes: "{{ nodes - 1 }}", oifs: 27, xios: 1 }

      OMIP-SR:
        slurm:
          sbatch:
            opts:
              time: "00:30:00"  # Default for testing
        groups:
          - { nodes: "{{ nodes }}", xios: 1, nemo: 111 }

      CPLD-SR:
        slurm:
          sbatch:
            opts:
              time: "01:00:00"  # Default for testing
        groups:
          - { nodes: 1,                 oifs: 25, nemo: 9, xios: 1, rnfm: 1 }
          - { nodes: "{{ nodes - 1 }}", oifs: 25, nemo: 10, xios: 1 }

      CCCL-SR:
        slurm:
          sbatch:
            opts:
              time: "01:30:00"  # Default for testing (carbon cycle with LPJG)
        groups:
          - { nodes: 1,                 oifs: 21, nemo: 26, rnfm: 1, lpjg: 1 }
          - { nodes: "{{ nodes - 1 }}", oifs: 21, nemo: 26, xios: 1, lpjg: 1 }

      CCCL-SR_slow:
        groups:
          - { nodes: 1,                 oifs: 18, nemo: 38, rnfm: 1, lpjg: 1 }
          - { nodes: "{{ nodes - 1 }}", oifs: 18, nemo: 38, xios: 1, lpjg: 1 }

      AMIP-HR:
          oifs:
            omp_num_threads: 8
            omp_stacksize: "64M"
          xios:
            omp_num_threads: 8
          groups:
            - { nodes: "{{ nodes - 1 }}", oifs: 14 } #, oifs: 13, xios: 1 }
            - { nodes: 1, xios: 2, amipfr: 1 } 

